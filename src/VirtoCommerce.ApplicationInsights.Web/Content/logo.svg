<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128" role="img" aria-label="Application Insights">
  <title>Application Insights</title>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="92%" y2="100%">
      <stop offset="0%" stop-color="#5FC8F5"/>
      <stop offset="100%" stop-color="#265FC6"/>
    </linearGradient>
    <linearGradient id="panel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#E6F3FF"/>
    </linearGradient>
    <filter id="lift" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="3" stdDeviation="3.5" flood-color="#0B3F66" flood-opacity="0.30"/>
    </filter>
  </defs>

  <rect width="128" height="128" rx="28" fill="url(#bg)"/>

  <g transform="translate(64,64)" filter="url(#lift)">
    <!-- Dashboard panel -->
    <rect x="-44" y="-39" width="88" height="78" rx="12" fill="url(#panel)"/>
    <!-- Baseline -->
    <line x1="-34" y1="26" x2="34" y2="26" stroke="#C2D8EC" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Colored bars -->
    <rect x="-32" y="3" width="14" height="23" rx="3.5" fill="#5FC8F5"/>
    <rect x="-12" y="-10" width="14" height="36" rx="3.5" fill="#9D86F5"/>
    <rect x="9" y="-3" width="14" height="29" rx="3.5" fill="#FFC24D"/>
    <!-- Upward trend line + node -->
    <polyline points="-29,10 -10,-3 8,-13 31,-29" fill="none" stroke="#2FA85A" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="31" cy="-29" r="7" fill="#3FD8B4" stroke="#ffffff" stroke-width="3"/>
  </g>
</svg>
